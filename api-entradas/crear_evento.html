<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Evento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .contenedor {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #soloAdmin {
            display: none;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Crear Evento</h2>

    <p id="mensajeRol" style="color:red;"></p>

    <div id="soloAdmin">
        <label>Nombre del evento</label>
        <input type="text" id="nombre">

        <label>Descripción</label>
        <textarea id="descripcion"></textarea>

        <label>Ubicación</label>
        <input type="text" id="ubicacion">

        <label>Fecha</label>
        <input type="date" id="fecha">

        <label>Entradas totales (máximo 155)</label>
        <input type="number" id="entradas_totales" min="1" max="155" required>

        <hr>

        <h3>Imagen del evento</h3>
        <input type="file" id="imagen">

        <button onclick="crearEvento()">Crear evento</button>

        <p id="resultado"></p>
    </div>
</div>

<script>
let usuarioRol = null;

// 1. Comprobar sesión
fetch("http://localhost/api-entradas/public/api/sesion", {
    method: "GET",
    credentials: "include"
})
.then(res => res.json())
.then(data => {
    if (!data.logueado) {
        document.getElementById("mensajeRol").textContent =
            "Debes iniciar sesión para crear eventos.";
        return;
    }

    usuarioRol = data.rol;

    if (usuarioRol === "admin") {
        document.getElementById("soloAdmin").style.display = "block";
    } else {
        document.getElementById("mensajeRol").textContent =
            "No tienes permisos para crear eventos (solo administradores).";
    }
});

// 2. Crear evento
function crearEvento() {
    const entradasTotales = Number(document.getElementById("entradas_totales").value);

    if (!Number.isInteger(entradasTotales) || entradasTotales < 1 || entradasTotales > 155) {
        document.getElementById("resultado").textContent =
            "Las entradas totales deben estar entre 1 y 155.";
        return;
    }

    const data = {
        nombre: document.getElementById("nombre").value,
        descripcion: document.getElementById("descripcion").value,
        ubicacion: document.getElementById("ubicacion").value,
        fecha: document.getElementById("fecha").value,
        entradas_totales: entradasTotales
    };

    fetch("http://localhost/api-entradas/public/api/eventos", {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(async data => {
        if (data.id) {
            document.getElementById("resultado").textContent =
                "Evento creado con ID: " + data.id;

            // Subir imagen si existe
            const archivo = document.getElementById("imagen").files[0];
            if (archivo) {
                await subirImagen(data.id);
            }

            alert("Evento creado correctamente");
        } else {
            document.getElementById("resultado").textContent =
                JSON.stringify(data, null, 2);
        }
    });
}

// 3. Subir imagen del evento
function subirImagen(eventoId) {
    const archivo = document.getElementById("imagen").files[0];
    if (!archivo) return;

    const formData = new FormData();
    formData.append("imagen", archivo);

    return fetch(`http://localhost/api-entradas/public/api/eventos/${eventoId}/imagen`, {
        method: "POST",
        credentials: "include",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        console.log("Imagen subida:", data);
    });
}
</script>

</body>
</html>
