<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
</head>
<body>
    <h2>Test Registro de Usuario</h2>
    <form >
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="file" id="foto_perfil" placeholder="Foto de Perfil">
        <button type="button" onclick="registrarUsuario()">Registrar</button>
    </form>

    <script>
        function registrarUsuario(){
            const data = {
                nombre: document.getElementById("nombre").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                foto_perfil: document.getElementById("foto_perfil").files[0]
            };

            fetch( "http://localhost/api-entradas/public/api/usuarios", {
                method: "POST",
                headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                body: JSON.stringify(data)
            })
            .then((respuesta) => {
                    if (respuesta.ok) return respuesta.json();
                    throw new Error('Error en la red');

            }).then(datos => {
                    console.log(datos);
            }).catch(error => console.error("Error ", error));
        }
        
    </script>
</body>
</html>
