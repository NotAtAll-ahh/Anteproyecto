<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
</head>
<body>
    <h2>Test Registro de Usuario</h2>

    <script>
         <script>
        const producto = { ref: "A1", precio: 25 };
        fetch( "http://localhost/api-entradas/public/api/usuarios", {
            method: "POST",
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(producto)
        })
        .then((respuesta) => {
                if (respuesta.ok) return respuesta.text();
                throw new Error('Error en la red');

        }).then(datos => {
                console.log(datos);
        }).catch(error => console.error("Error ", error));

        //ver respuesta en Network
    </script>
    </script>
</body>
</html>
